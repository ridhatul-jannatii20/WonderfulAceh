<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Wonderful Aceh</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
  <link rel="icon" type="image/png" href="image/logo1.png">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Two logos from image/ folder -->
    <div class="login-logos">
      <img
        src="image/logo1.png"
        alt="Logo 1"
        class="login-logo-img"
        onerror="this.outerHTML='<div class=\'login-logo-fallback\'><i class=\'bi bi-gem\'></i></div>'"
      />
      <div class="login-logo-divider"></div>
      <img
        src="image/logo2.png"
        alt="Logo 2"
        class="login-logo-img"
        onerror="this.outerHTML='<div class=\'login-logo-fallback\'><i class=\'bi bi-stars\'></i></div>'"
      />
    </div>

    <h1 class="login-title">Wonderful <span>Aceh</span></h1>
    <p class="login-subtitle">Masuk untuk melanjutkan ke portal wisata</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form" novalidate>
      <div class="login-form-group">
        <label class="login-label" for="login-username">Username</label>
        <div class="login-input-wrap">
          <i class="bi bi-person login-input-icon"></i>
          <input
            type="text"
            id="login-username"
            class="login-input"
            placeholder="Masukkan username"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <div class="login-form-group">
        <label class="login-label" for="login-password">Password</label>
        <div class="login-input-wrap">
          <i class="bi bi-lock login-input-icon"></i>
          <input
            type="password"
            id="login-password"
            class="login-input"
            placeholder="Masukkan password"
            autocomplete="current-password"
            required
          />
        </div>
      </div>

      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right"></i> Masuk
      </button>
    </form>

    <a href="index.html" class="login-back">
      <i class="bi bi-arrow-left"></i> Kembali ke Beranda
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
